name: Bug report
description: Report a parser, benchmark, or analysis issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include a minimal file excerpt or synthetic example when possible.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - XRD parser
        - XRD benchmark
        - Phase matching
        - Structure factor / refinement
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Data privacy
      options:
        - label: I have removed private lab data and sensitive metadata.
          required: true
